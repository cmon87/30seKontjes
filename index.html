<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30 Sekontjes</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #14151c; color: #f4f5fa; font-family: system-ui, sans-serif; }
    p { padding: 24px; text-align: center; }
  </style>
</head>
<body>
  <p id="status">App wordt geladen…</p>
  <script>
    (async () => {
      try {
        const paths = [
          "app/index.part00",
          "app/index.part01",
          "app/index.part02",
          "app/index.part03",
          "app/index.part04",
          "app/index.part05"
        ];
        const parts = await Promise.all(paths.map(async path => {
          const response = await fetch(path, { cache: "no-store" });
          if (!response.ok) throw new Error(`${path}: ${response.status}`);
          return response.text();
        }));
        const binary = atob(parts.join("").replace(/\s/g, ""));
        const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
        const html = new TextDecoder("utf-8").decode(bytes);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.getElementById("status").textContent = "De app kon niet worden geladen: " + error.message;
      }
    })();
  </script>
</body>
</html>
